<svg xmlns="http://www.w3.org/2000/svg" width="760" height="210" viewBox="0 0 760 210" role="img" aria-labelledby="title desc">
  <title id="title">Jetson-PI Edge</title>
  <desc id="desc">Jetson-PI Edge logo combining a robotic vision chip, a pi symbol, and a forward motion trail.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071827"/>
      <stop offset="1" stop-color="#102f43"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#35d8c1"/>
      <stop offset="1" stop-color="#68a7ff"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd166"/>
      <stop offset="1" stop-color="#ff7a59"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="5" y="5" width="750" height="200" rx="30" fill="url(#panel)" stroke="#24506a" stroke-width="2"/>
  <circle cx="108" cy="105" r="67" fill="#0b2234" stroke="url(#accent)" stroke-width="3"/>

  <g fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round">
    <path d="M58 74h-18m18 31h-25m25 31h-18"/>
    <path d="M158 74h18m-18 31h25m-25 31h18"/>
    <path d="M78 55V38m30 17V31m30 24V38"/>
    <path d="M78 155v17m30-17v24m30-24v17"/>
  </g>

  <rect x="58" y="55" width="100" height="100" rx="19" fill="#0e3045" stroke="url(#accent)" stroke-width="4"/>
  <path d="M78 88c18-18 42-18 60 0M78 122c18 18 42 18 60 0" fill="none" stroke="#38dcc5" stroke-width="4" stroke-linecap="round" opacity=".8"/>
  <circle cx="84" cy="105" r="7" fill="#68a7ff" filter="url(#glow)"/>
  <circle cx="132" cy="105" r="7" fill="#35d8c1" filter="url(#glow)"/>
  <path d="M92 80h36M101 80v51m22-51v51" fill="none" stroke="#f4fbff" stroke-width="7" stroke-linecap="round"/>
  <path d="M145 48l-17 31h14l-12 28 31-39h-16l12-20z" fill="url(#spark)" filter="url(#glow)"/>

  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <text x="213" y="101" fill="#f5fbff" font-size="58" font-weight="750" letter-spacing="-2">Jetson-PI</text>
    <text x="495" y="101" fill="#44d7c4" font-size="58" font-weight="350">Edge</text>
    <text x="216" y="137" fill="#a8c4d3" font-size="18" letter-spacing="3">REAL-TIME VLA INFERENCE ONBOARD</text>
  </g>

  <g fill="none" stroke-linecap="round">
    <path d="M217 158h424" stroke="#244c63" stroke-width="2"/>
    <path d="M217 158h195" stroke="url(#accent)" stroke-width="3"/>
    <path d="M650 151l14 7-14 7" stroke="#ff9b62" stroke-width="3"/>
  </g>
</svg>
